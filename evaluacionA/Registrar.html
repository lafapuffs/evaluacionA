<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width">
        <title>MiCRM - Registro</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <main class="registro-container">
            <section id="Registro">
                <header>
                    <h1>MiCRM</h1>
                    <p id="subtitulo">Registro de clientes</p> 
       
       <form>
        <fieldset class="grid-fieldset">
            <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="cedula">Cédula / Identificación *</label>
                <input type="tel" id="cedula" name="cedula" required pattern="[0-9]{8,10}" title="Debe incluir entre 8 y 10 dígitos numéricos" placeholder="Ej. 12345678">
            </div>
            <div class="form-group">
                <label for="reg-email">Correo Electrónico *</label>
                <input type="email" id="reg-email" name="email" required placeholder="cliente@empresa.com">
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono *</label>
                <input type="tel" id="telefono" name="telefono" required pattern="[0-9]{11}" title="Debe ingresar un número de exactamente 11 dígitos" placeholder="Ej. 04141234567">
            </div>
            <div class="form-group full-width">
                <label for="direccion">Dirección Física (Opcional)</label>
                <textarea id="direccion" name="direccion" rows="3" placeholder="Av. Principal, Edificio Centro, Piso 4..."></textarea>
            </div>
            <div class="form-group">
                <label>Tipo de Cliente *</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="tipo_cliente" value="Natural" checked required>
                        <span>Persona Natural</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="tipo_cliente" value="Juridico">
                        <span>Persona Jurídica</span>
                    </label>
                </div>
            </div>
            <label> Sector - Industria</label>
            <select required>
                <option disabled selected> Seleccione una industria... </option>
                <option> Tecnología </option>
                <option> Comercio </option>
                <option> Salud </option>
                <option> Educación </option>
                <option> Otro </option>
            </select>

            <button type="submit" class="btn-primary">Registrar</button>
        </fieldset>
     </form>
     <footer>
     <a href="index.html">¿Ya tienes una cuenta? Inicia Sesiín!</a>
    </footer>

    </header>
    </body>
